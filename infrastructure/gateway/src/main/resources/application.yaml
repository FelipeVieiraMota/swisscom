server:
  port: ${SERVER_PORT:8080}

spring:
  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL:http://localhost:10000}

  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: ${GATEWAY_DISCOVERY_LOCATOR_ENABLED:false}
              lower-case-service-id: true
          default-filters:
            - PreserveHostHeader

          routes:
            # Authenticator API
            - id: authenticator-api
              uri: ${AUTH_SERVICE_URI:lb://authenticator}
              predicates:
                - Path=/api/v1/auth/**

            # Link management API
            - id: link-api
              uri: ${LINK_API_SERVICE_URI:lb://links}
              predicates:
                - Path=/api/v1/links,/api/v1/links/**

            # Public short-link redirect
            - id: link-redirect
              uri: ${LINK_API_SERVICE_URI:lb://links}
              predicates:
                - Path=/r/**
                - Method=GET

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    health:
      show-details: always
    gateway:
      access: read-only

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n"
  level:
    org.springframework.cloud.gateway: ${LOGGING_LEVEL_GATEWAY:INFO}
    com.netflix.discovery: ${LOGGING_LEVEL_NETFLIX_DISCOVERY:INFO}
    com.netflix.eureka: ${LOGGING_LEVEL_NETFLIX_EUREKA:INFO}
    org.springframework.cloud.netflix.eureka: ${LOGGING_LEVEL_SPRING_CLOUD_NETFLIX_EUREKA:INFO}

eureka:
  client:
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    non-secure-port: ${EUREKA_INSTANCE_NON_SECURE_PORT:8080}
    status-page-url-path: ${EUREKA_INSTANCE_STATUS_PAGE_URL_PATH:/actuator/info}
    health-check-url-path: ${EUREKA_INSTANCE_HEALTH_CHECK_URL_PATH:/actuator/health}
    metadata-map:
      management.context-path: ${EUREKA_INSTANCE_MANAGEMENT_CONTEXT_PATH:/actuator}
