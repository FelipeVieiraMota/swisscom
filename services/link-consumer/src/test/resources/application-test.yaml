spring:
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
  datasource:
    url: jdbc:h2:mem:links-consumer;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
