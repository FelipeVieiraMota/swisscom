services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - edge
    volumes:
      - ./caddy/prod/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_prod_data:/data
      - caddy_prod_config:/config
    depends_on:
      gateway:
        condition: service_healthy

  gateway:
    env_file:
      - ./env/prod/gateway.env
    environment:
      MANAGEMENT_SERVER_PORT: 8081
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE_URL: https://localhost/
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_MANAGEMENT_URL: http://gateway:8081/actuator
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_HEALTH_URL: http://gateway:8081/actuator/health
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8081/actuator/health" ]

  authenticator:
    env_file:
      - ./env/prod/authenticator.env
    environment:
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the local .env file}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the local .env file}
      SPRINGDOC_API_DOCS_ENABLED: false
      SPRINGDOC_SWAGGER_UI_ENABLED: false

  auth-postgres:
    environment:
      POSTGRES_DB: authenticator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the local .env file}

  discovery:
    env_file:
      - ./env/prod/discovery.env

  observability:
    env_file:
      - ./env/prod/observability.env

volumes:
  caddy_prod_data:
  caddy_prod_config:
