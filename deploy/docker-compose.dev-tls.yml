services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
    networks:
      - edge
    volumes:
      - ./caddy/dev/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_dev_data:/data
      - caddy_dev_config:/config
    depends_on:
      gateway:
        condition: service_healthy

  observability:
    environment:
      SPRING_BOOT_ADMIN_UI_PUBLIC_URL: https://admin.localhost:443/

  discovery:
    environment:
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE_URL: https://eureka.localhost:443/

  gateway:
    environment:
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE_URL: https://gateway.localhost:443/

volumes:
  caddy_dev_data:
  caddy_dev_config:
